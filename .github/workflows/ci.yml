name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: app (typecheck · test · lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Lint runs but doesn't fail CI yet — there are pre-existing
      # React-19 setState-in-effect warnings in ThemeToggle / MobileNav /
      # ConvaiWidget that need their own PR. Tighten this once they're
      # fixed by removing continue-on-error.
      - run: npm run lint
        continue-on-error: true

  prompts:
    name: agent prompts drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: node scripts/check-prompts-drift.mjs
